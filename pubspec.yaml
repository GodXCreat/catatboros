name: catatboros
description: Aplikasi pencatat pengeluaran harian offline dengan smart input.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  fl_chart: ^1.0.0
  google_fonts: ^6.3.0
  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.1
  path_provider: ^2.1.5
  share_plus: ^11.0.0
  file_picker: ^10.2.0
  csv: ^6.0.0
  local_auth: ^3.0.0
  crypto: ^3.0.6
  home_widget: ^0.9.1
  collection: ^1.19.1

flutter:
  uses-material-design: true
