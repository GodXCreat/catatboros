name: Build CatatBoros APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate missing Android wrapper files
        run: flutter create --platforms=android --project-name catatboros --org com.catatboros .

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$VERSION" == "main" ]]; then VERSION="1.0.0-${GITHUB_SHA::7}"; fi
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/CatatBoros-${VERSION}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatatBoros-APK
          path: artifacts/*.apk

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
